<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="طلباتي">
<meta name="theme-color" content="#080c14">
<title>طلباتي Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c14;
  --bg2:#0d1320;
  --bg3:#111827;
  --bg4:#172035;
  --bg5:#1e2a42;
  --border:#1e2d4a;
  --border2:#2a3f60;
  --border3:#374f72;
  --text:#f0f4ff;
  --text2:#8899bb;
  --text3:#4a5a7a;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --accent-glow:rgba(59,130,246,0.15);
  --accent-light:#0f1f3d;
  --green:#10b981;
  --green-dim:rgba(16,185,129,0.12);
  --amber:#f59e0b;
  --amber-dim:rgba(245,158,11,0.12);
  --red:#ef4444;
  --red-dim:rgba(239,68,68,0.12);
  --purple:#8b5cf6;
  --purple-dim:rgba(139,92,246,0.12);
  --teal:#06b6d4;
  --r:12px;--r-lg:16px;--r-xl:20px;
  --shadow:0 8px 32px rgba(0,0,0,0.6);
  --shadow-sm:0 2px 12px rgba(0,0,0,0.4);
  --font:'Cairo',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{overflow:hidden}
@media(max-width:768px){body{overflow:auto}html,body{height:auto}}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ─── AUTH ─── */
.auth-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9000;padding:20px;
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(59,130,246,0.08),transparent)}
.auth-card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-xl);padding:36px 32px;box-shadow:var(--shadow)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:16px}
.auth-brand-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(59,130,246,.3)}
.auth-brand-name{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.auth-brand-name span{color:var(--accent2)}
.auth-tagline{font-size:12px;color:var(--text3);letter-spacing:.5px}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:22px;gap:3px}
.auth-tab{padding:9px;text-align:center;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s;border:none;background:none;font-family:var(--font)}
.auth-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.4)}
.auth-alert{border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:14px;display:none;font-weight:500}
.auth-alert.err{background:var(--red-dim);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.auth-alert.ok{background:var(--green-dim);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}

/* ─── FORM ELEMENTS ─── */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;letter-spacing:.6px;text-transform:uppercase}
.fg label .req{color:var(--red)}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:all .15s;appearance:none}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.fi::placeholder{color:var(--text3)}
select.fi option{background:var(--bg3)}
textarea.fi{resize:vertical;min-height:76px;line-height:1.6}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.fr{grid-template-columns:1fr}}
.fhint{font-size:11px;color:var(--text3);margin-top:3px}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;font-family:var(--font);white-space:nowrap;user-select:none}
.btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border3)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(59,130,246,.3)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-green{background:var(--green-dim);border-color:rgba(16,185,129,.4);color:var(--green)}
.btn-green:hover{background:rgba(16,185,129,.2)}
.btn-red{background:var(--red-dim);border-color:rgba(239,68,68,.4);color:var(--red)}
.btn-red:hover{background:rgba(239,68,68,.2)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:7px}
.btn-full{width:100%;padding:12px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:9px;font-size:16px}

/* ─── APP LAYOUT ─── */
.app-wrap{display:grid;grid-template-columns:260px 1fr;height:100vh}
@media(max-width:900px){.app-wrap{grid-template-columns:220px 1fr}}
@media(max-width:768px){
  .app-wrap{grid-template-columns:1fr;height:auto;min-height:100vh}
  .sidebar{display:none!important}
  .mob-bar{display:flex!important}
  .main-wrap{padding-bottom:70px}
}

/* ─── SIDEBAR ─── */
.sidebar{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5}
.sb-head{padding:20px 18px 14px}
.sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.sb-brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 0 12px rgba(59,130,246,.25)}
.sb-brand-name{font-size:16px;font-weight:900;letter-spacing:-.3px}
.sb-brand-name span{color:var(--accent2)}
.sb-subtitle{font-size:10px;color:var(--text3);padding-right:42px;letter-spacing:.4px}
.sb-user{margin:12px 14px 0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px}
.sb-avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.sb-user-info .sb-uname{font-size:12px;font-weight:700}
.sb-user-info .sb-urole{font-size:10px;color:var(--text3);margin-top:1px}
.sb-logout{margin-right:auto;background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:3px;transition:color .15s;line-height:1}
.sb-logout:hover{color:var(--red)}
.sb-nav{padding:10px;flex:1;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.sb-sep{height:1px;background:var(--border);margin:6px 2px}
.sb-section{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.8px;padding:4px 10px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;user-select:none;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-light);color:var(--accent2);font-weight:600}
.nav-item.active::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:2px}
.nav-item .ni{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-right:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;min-width:18px;text-align:center}
.nav-badge.red{background:var(--red)}
.sb-foot{padding:12px 18px;border-top:1px solid var(--border);font-size:10px;color:var(--text3)}

/* ─── MAIN ─── */
.main-wrap{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:56px}
.topbar h1{font-size:16px;font-weight:700;flex:1;letter-spacing:-.2px}
.page-body{flex:1;overflow-y:auto;padding:20px;padding-bottom:env(safe-area-inset-bottom,20px)}
@media(max-width:768px){.page-body{padding:14px;padding-bottom:80px}}

/* ─── MOBILE NAV ─── */
.mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:100;justify-content:space-around;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));backdrop-filter:blur(12px)}
.mob-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 14px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:600;transition:color .15s;border:none;background:none;font-family:var(--font);letter-spacing:.3px;text-transform:uppercase}
.mob-item .mi{font-size:20px;line-height:1}
.mob-item.active{color:var(--accent2)}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-blue{background:var(--accent-light);color:var(--accent2);border:1px solid rgba(59,130,246,.3)}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.badge-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge-purple{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.badge-gray{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.badge-teal{background:rgba(6,182,212,.1);color:var(--teal);border:1px solid rgba(6,182,212,.3)}

/* ─── STAT CARDS ─── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.stats-row{grid-template-columns:1fr 1fr}}
.s-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
.s-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.s-card-bar{position:absolute;top:0;left:0;right:0;height:2px}
.s-card-label{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.s-card-val{font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1}
.s-card-sub{font-size:11px;margin-top:6px;color:var(--text3)}
.s-card-icon{position:absolute;top:14px;left:14px;font-size:20px;opacity:.25}

/* ─── SEARCH & FILTER ─── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.search-box{flex:1;min-width:180px;position:relative}
.search-box input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 36px 10px 13px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:all .15s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-box input::placeholder{color:var(--text3)}
.search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);letter-spacing:.2px}
.chip:hover{border-color:var(--border2);color:var(--text2)}
.chip.on{background:var(--accent-light);border-color:rgba(59,130,246,.5);color:var(--accent2)}

/* ─── TABLE ─── */
.tbl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.tbl-head{display:grid;padding:10px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.6px;background:var(--bg3);text-transform:uppercase;gap:10px}
.tbl-row{display:grid;padding:13px 16px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .1s;gap:10px}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--bg3)}
.tbl-row:active{background:var(--bg4)}
.o-cols{grid-template-columns:80px 1fr 110px 110px 100px 90px 110px}
@media(max-width:1100px){.o-cols{grid-template-columns:72px 1fr 100px 100px 88px 108px}.hmd{display:none!important}}
@media(max-width:768px){.o-cols{grid-template-columns:64px 1fr 90px 80px}.hsm{display:none!important}}
.c-cols{grid-template-columns:1fr 120px 70px 110px 100px 80px}
@media(max-width:700px){.c-cols{grid-template-columns:1fr 90px 90px}}
.oid{font-size:11px;font-weight:700;color:var(--accent2);font-family:var(--mono)}
.ci .cn{font-size:13px;font-weight:600}
.ci .cp{font-size:11px;color:var(--text3);direction:ltr;display:block;margin-top:1px;font-family:var(--mono)}
.cm{font-size:12px;color:var(--text2)}
.pc{font-size:13px;font-weight:700;font-family:var(--mono)}
.ra{display:flex;gap:5px}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:500;backdrop-filter:blur(6px);padding:0}
@media(min-width:600px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow);animation:slideUp .25s ease}
@media(min-width:600px){.modal{border-radius:var(--r-xl);animation:fadeScale .2s ease}}
.modal.wide{max-width:660px}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeScale{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.modal-drag{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0;display:block}
@media(min-width:600px){.modal-drag{display:none}}
.m-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--bg2);z-index:1}
.m-head h3{font-size:15px;font-weight:700;flex:1;letter-spacing:-.2px}
.m-body{padding:18px 20px}
.m-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.x-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;padding:0 2px;transition:color .15s}
.x-btn:hover{color:var(--text)}

/* ─── DETAIL ─── */
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.det-item .dl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase}
.det-item .dv{font-size:13px;font-weight:600}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:14px 0}
.sec-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:10px}

/* ─── EMPTY ─── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 20px;color:var(--text3);text-align:center}
.empty-state .ei{font-size:40px;margin-bottom:14px;opacity:.4}
.empty-state h3{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:5px}
.empty-state p{font-size:12px}

/* ─── REPORTS ─── */
.r-tabs{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:18px;gap:3px}
.r-tab{flex:1;padding:8px;text-align:center;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none;font-family:var(--font);letter-spacing:.3px}
.r-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.r-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:14px}
.r-card h3{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:14px}
.bar-wrap{display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-lbl{font-size:11px;color:var(--text2);width:110px;flex-shrink:0;text-align:right}
.bar-track{flex:1;background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width .6s cubic-bezier(.16,1,.3,1)}
.bar-val{font-size:11px;color:var(--text2);width:90px;flex-shrink:0;font-family:var(--mono)}

/* ─── ADMIN ─── */
.adm-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:768px){.adm-grid{grid-template-columns:1fr}}
.adm-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
.adm-card h3{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.code-pill{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent2);letter-spacing:3px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:8px}
.code-pill:hover{border-color:var(--accent);background:var(--accent-light)}
.u-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.u-row:last-child{border-bottom:none}
.u-av{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}

/* ─── NOTIFICATION DOT ─── */
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;margin-right:auto;box-shadow:0 0 6px var(--red);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─── PRIORITY INDICATOR ─── */
.priority-bar{width:3px;height:100%;border-radius:2px;flex-shrink:0}

/* ─── TOAST ─── */
.toast-wrap{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;align-items:center}
@media(min-width:600px){.toast-wrap{bottom:24px}}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 18px;font-size:13px;font-weight:500;box-shadow:var(--shadow);animation:toastIn .25s ease;white-space:nowrap}

// Safe storage: localStorage with fallback to in-memory (iOS Safari private mode fix)
const _mem={};
const _ls=(()=>{try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true;}catch{return false;}})();
const $={
  g:k=>{try{if(_ls){const v=localStorage.getItem(k);return v?JSON.parse(v):(_mem[k]??null);}return _mem[k]??null;}catch{return _mem[k]??null;}},
  s:(k,v)=>{try{if(_ls)localStorage.setItem(k,JSON.stringify(v));_mem[k]=v;}catch{_mem[k]=v;}},
  d:k=>{try{if(_ls)localStorage.removeItem(k);}catch{}delete _mem[k];}
};

const getUsers=()=>$.g(K.U)||[];
const saveUsers=u=>$.s(K.U,u);
const getAllOrders=()=>$.g(K.O)||[];

const saveSettings=s=>$.s(K.SET,s);

function addLog(orderId,msg,color='accent'){
  const logs=getLogs();
  logs.unshift({orderId,msg,color,at:new Date().toISOString(),by:CU?CU.name:'—'});

}
function getOrderLogs(id){return getLogs().filter(l=>l.orderId===id);}

  const d=new Date(iso);

         d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
}


// ═══════════════════════════════════════════════════
// MIGRATION — from old versions
// ═══════════════════════════════════════════════════
function migrate(uid){
  let count=0;
  // try both legacy keys
  [K.L1, 'talabati_v2', 'STORAGE_KEY'].forEach(lk=>{
    const old=$.g(lk);
    if(!old||!Array.isArray(old)) return;
    const all=getAllOrders();
    const ids=new Set(all.map(o=>o.id));
    old.forEach(o=>{
      if(!ids.has(o.id)){
        all.unshift({...o,userId:uid,priority:'عادية',deadline:'',migrated:true});
        ids.add(o.id);count++;
      }
    });
    if(count>0){saveAllOrders(all);$.d(lk);}
  });
  return count;
}

function authTab(t){
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',t==='login'?i===0:i===1));
  document.getElementById('login-f').style.display=t==='login'?'block':'none';
  document.getElementById('reg-f').style.display=t==='reg'?'block':'none';
  document.getElementById('auth-alert').style.display='none';
}
function showAlert(msg,type='err'){
  const el=document.getElementById('auth-alert');
  el.className='auth-alert '+(type==='ok'?'ok':'err');
  el.textContent=msg;el.style.display='block';
}
function doLogin(){
  const u=document.getElementById('l-u').value.trim();
  const p=document.getElementById('l-p').value;
  if(!u||!p){showAlert('يرجى تعبئة جميع الحقول');return;}
  const found=getUsers().find(x=>x.username===u&&x.pw===btoa(unescape(encodeURIComponent(p))));
  if(!found){showAlert('اسم المستخدم أو كلمة المرور غير صحيحة');return;}
  $.s(K.S,found);bootApp(found);
}
function doRegister(){
  const name=document.getElementById('r-n').value.trim();
  const user=document.getElementById('r-u').value.trim().replace(/\s+/g,'');
  const pass=document.getElementById('r-p').value;
  const code=document.getElementById('r-c').value.trim().toUpperCase();
  if(!name||!user||!pass||!code){showAlert('يرجى تعبئة جميع الحقول');return;}
  if(pass.length<6){showAlert('كلمة المرور 6 أحرف على الأقل');return;}
  const codes=getCodes();
  const cObj=codes.find(c=>c.code===code&&!c.used);
  if(!cObj){showAlert('الكود غير صحيح أو مستخدم مسبقاً');return;}
  const users=getUsers();
  if(users.find(x=>x.username===user)){showAlert('اسم المستخدم موجود مسبقاً');return;}
  const nu={id:'U'+Date.now(),username:user,name,role:cObj.role||'موظف',
    pw:btoa(unescape(encodeURIComponent(pass))),joined:today()};
  cObj.used=true;cObj.usedBy=user;cObj.usedAt=today();
  saveCodes(codes);users.push(nu);saveUsers(users);
  showAlert('✅ تم إنشاء الحساب — يمكنك الدخول الآن','ok');
  setTimeout(()=>authTab('login'),1800);
}

// ═══════════════════════════════════════════════════
// DEADLINE REMINDERS
// ═══════════════════════════════════════════════════
function renderDeadlineBanner(){
  const t=today();
  const soon=MY.filter(o=>{
    if(!o.deadline||['مكتمل','ملغي'].includes(o.status)) return false;
    const diff=Math.ceil((new Date(o.deadline)-new Date(t))/(1000*60*60*24));
    return diff<=3;
  });
  if(!soon.length) return '';
  const overdue=soon.filter(o=>o.deadline<t);
  const dueToday=soon.filter(o=>o.deadline===t);
  const dueSoon=soon.filter(o=>o.deadline>t);
  const parts=[];
  if(overdue.length) parts.push('<span style="color:#fca5a5">⛔ '+overdue.length+' متأخر</span>');
  if(dueToday.length) parts.push('<span style="color:var(--amber)">🔔 '+dueToday.length+' اليوم</span>');
  if(dueSoon.length) parts.push('<span style="color:var(--text2)">⏰ '+dueSoon.length+' قريباً</span>');
  return '<div class="deadline-banner" onclick="showDeadlines()">'+
    '<span style="font-size:18px">📅</span>'+
    '<div style="flex:1">'+
      '<div style="font-size:12px;font-weight:700;color:var(--amber);margin-bottom:2px">تذكير مواعيد التسليم</div>'+
      '<div style="font-size:11px;display:flex;gap:12px">'+parts.join('')+'</div>'+
    '</div>'+
    '<span class="db-count">'+soon.length+'</span>'+
    '<span style="color:var(--text3);font-size:12px">←</span></div>';
}
function showDeadlines(){
  const t=today();
  const soon=MY.filter(o=>{
    if(!o.deadline||['مكتمل','ملغي'].includes(o.status)) return false;
    const diff=Math.ceil((new Date(o.deadline)-new Date(t))/(1000*60*60*24));
    return diff<=7;
  }).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  let rows=soon.map(o=>{
    const diff=Math.ceil((new Date(o.deadline)-new Date(t))/(1000*60*60*24));
    const clr=diff<0?'var(--red)':diff===0?'var(--amber)':diff<=2?'#f97316':'var(--text2)';
    const lbl=diff<0?'متأخر '+Math.abs(diff)+' يوم':diff===0?'اليوم!':diff===1?'غداً':'بعد '+diff+' أيام';
    return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="closeModal();viewOrder(\''+o.id+'\')">'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:600">'+o.client+'</div>'+
      '<div style="font-size:11px;color:var(--text3);margin-top:2px">'+o.id+' · '+o.service+'</div></div>'+
      '<div style="text-align:left"><div style="font-size:12px;font-weight:700;color:'+clr+'">'+lbl+'</div>'+
      '<div style="font-size:10px;color:var(--text3);font-family:var(--mono)">'+o.deadline+'</div></div>'+
      '<span class="badge '+SCFG[o.status].c+'">'+o.status+'</span></div>';
  }).join('');
  document.getElementById('modal-box').innerHTML=
    '<span class="modal-drag"></span>'+
    '<div class="m-head"><h3>📅 مواعيد التسليم</h3><button class="x-btn" onclick="closeModal()">✕</button></div>'+
    '<div class="m-body">'+(soon.length?rows:'<div class="empty-state"><div class="ei">✅</div><h3>لا توجد مواعيد قريبة</h3></div>')+'</div>'+
    '<div class="m-foot"><button class="btn btn-ghost" onclick="closeModal()">إغلاق</button></div>';
  showModal();
}

function getFiltered(){
  let res=MY.filter(o=>{
    const mF=FILT==='الكل'||(FILT==='عاجلة'?(o.priority==='عاجلة'&&!['مكتمل','ملغي'].includes(o.status)):o.status===FILT||o.service===FILT);
    const s=SRCH.trim().toLowerCase();
    const mS=!s||o.client.includes(s)||o.id.toLowerCase().includes(s)||o.phone.includes(s)||o.service.includes(s)||(o.desc||'').includes(s);
    return mF&&mS;
  });
  res.sort((a,b)=>{
    const pa=['عاجلة','عالية','عادية','منخفضة'];
    if(SORT.key==='priority') return (pa.indexOf(a.priority||'عادية')-pa.indexOf(b.priority||'عادية'))*SORT.dir;
    if(SORT.key==='price') return ((a.price||0)-(b.price||0))*SORT.dir;
    return ((a.date||'')<(b.date||'')?-1:1)*SORT.dir;
  });
  return res;
}
function setFilt(f){FILT=f;render();}
function doSearch(v){SRCH=v;render();}
function cycleSort(){
  const keys=['date','price','priority'];
  const i=keys.indexOf(SORT.key);
  if(i===keys.length-1){SORT.dir*=-1;}else{SORT.key=keys[i+1];}
  render();
}

function renderClients(){
  const map={};
  MY.forEach(o=>{

  const filtered_clients=CSRCH?clients.filter(c=>c.name.includes(CSRCH)||c.phone.includes(CSRCH)):clients;

function renderReports(){
  return `<div class="r-tabs">
    <button class="r-tab ${RPD==='daily'?'active':''}" onclick="setRPD('daily')">يومي</button>
    <button class="r-tab ${RPD==='weekly'?'active':''}" onclick="setRPD('weekly')">أسبوعي</button>
    <button class="r-tab ${RPD==='monthly'?'active':''}" onclick="setRPD('monthly')">شهري</button>
    <button class="r-tab ${RPD==='all'?'active':''}" onclick="setRPD('all')">الكل</button>
  </div>${buildReport()}`;
}
function setRPD(p){RPD=p;render();}

function getROrders(){
  const now=new Date();
  return MY.filter(o=>{
    if(RPD==='all') return true;
    const d=new Date(o.date||'');
    if(RPD==='daily') return o.date===today();
    if(RPD==='weekly'){const w=new Date(now);w.setDate(w.getDate()-6);return d>=w;}
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
}
function periodLbl(){return{daily:'اليوم',weekly:'آخر 7 أيام',monthly:'هذا الشهر',all:'إجمالي'}[RPD];}

function buildReport(){
  const ro=getROrders();
  const total=ro.length,done=ro.filter(o=>o.status==='مكتمل').length;
  const totalRev=ro.reduce((a,o)=>a+(o.price||0),0);
  const doneRev=ro.filter(o=>o.status==='مكتمل').reduce((a,o)=>a+(o.price||0),0);
  const pending=ro.filter(o=>o.status!=='مكتمل'&&o.status!=='ملغي').reduce((a,o)=>a+(o.price||0),0);

  ro.forEach(o=>{if(bySvc[o.service]){bySvc[o.service].n++;bySvc[o.service].rev+=(o.price||0);}});
  const sArr=Object.entries(bySvc).filter(([,v])=>v.n>0).sort((a,b)=>b[1].rev-a[1].rev);
  const maxR=Math.max(...sArr.map(([,v])=>v.rev),1);
  const bySt={};STAT.forEach(s=>bySt[s]=0);ro.forEach(o=>bySt[o.status]=(bySt[o.status]||0)+1);

    <div class="s-card"><div class="s-card-bar" style="background:var(--amber)"></div><div class="s-card-label">إيرادات محصّلة</div><div class="s-card-val">${fmtMoney(doneRev)}</div><div class="s-card-sub">ر.س</div></div>
    <div class="s-card"><div class="s-card-bar" style="background:var(--teal)"></div><div class="s-card-label">إيرادات معلقة</div><div class="s-card-val">${fmtMoney(pending)}</div><div class="s-card-sub">ر.س</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
    <div class="r-card">
      <h3>📦 توزيع الخدمات</h3>
      ${sArr.length?`<div class="bar-wrap">${sArr.map(([s,v])=>`
        <div class="bar-row"><div class="bar-lbl">${s}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v.rev/maxR*100)}%"></div></div>
        <div class="bar-val">${fmtMoney(v.rev)} ر.س</div></div>`).join('')}</div>`
      :`<div class="empty-state" style="padding:20px"><div class="ei" style="font-size:24px">📊</div><p>لا توجد بيانات</p></div>`}
    </div>
    <div class="r-card">
      <h3>🔄 الحالات</h3>
      ${Object.entries(bySt).filter(([,v])=>v>0).map(([s,c])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span class="badge ${SCFG[s].c}">${s}</span>
          <div style="flex:1;background:var(--bg3);border-radius:3px;height:4px;overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--accent);width:${Math.round(c/total*100)}%"></div></div>
          <span style="font-size:13px;font-weight:700;font-family:var(--mono)">${c}</span>
        </div>`).join('')||`<div class="empty-state" style="padding:20px"><p>لا توجد بيانات</p></div>`}
      <div class="divider"></div>
      <h3>📱 مصادر الطلبات</h3>
      ${Object.entries(bySrc).sort((a,b)=>b[1]-a[1]).map(([s,c])=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:14px">${SICO[s]||'📞'}</span>
          <span style="font-size:12px;color:var(--text2);flex:1">${s}</span>
          <span class="badge badge-gray">${c}</span>
        </div>`).join('')}
    </div>
  </div>
  <div class="r-card">
    <h3>📋 تفاصيل الطلبات — ${periodLbl()}</h3>
    ${ro.length===0?`<div class="empty-state" style="padding:24px"><div class="ei">📭</div><h3>لا توجد طلبات</h3></div>`:
    `<div class="tbl full-tbl">
      <div class="tbl-head" style="grid-template-columns:78px 120px 1fr 95px 100px 88px;display:grid;gap:8px;padding:9px 14px">
        <div>الرقم</div><div>العميل</div><div>تفاصيل الطلب</div><div>الخدمة</div><div>الحالة</div><div>المبلغ</div>

      </div>
    </div>`}
  </div>`;
}

function exportExcel(){
  const ro=getROrders();
  if(!ro.length){toast('⚠️ لا توجد بيانات');return;}
  const done=ro.filter(o=>o.status==='مكتمل');
  const totalRev=ro.reduce((a,o)=>a+(o.price||0),0);
  const doneRev=done.reduce((a,o)=>a+(o.price||0),0);
  const now=new Date();

  const H=['رقم الطلب','اسم العميل','رقم الجوال','نوع الخدمة','الأولوية','الحالة','المبلغ (ريال)','تاريخ الطلب','موعد التسليم','مصدر الطلب','تفاصيل الطلب','ملاحظات','الموظف'];
  const rows=ro.map(o=>[
    o.id, o.client, o.phone, o.service,
    o.priority||'عادية', o.status, o.price||0,
    o.date||'', o.deadline||'', o.source||'',
    clean(o.desc), clean(o.notes), CU.name
  ]);
  const sumRows=[
    [],
    ['=== ملخص التقرير ==='],
    ['الفترة:', periodLbl()],
    ['تاريخ الطصدير:', now.toLocaleDateString('ar-SA')],
    ['الموظف:', CU.name],
    ['إجمالي الطلبات:', ro.length],
    ['المكتملة:', done.length],
    ['نسبة الإنجاز:', (ro.length?Math.round(done.length/ro.length*100):0)+'%'],
    ['إجمالي المبالغ:', totalRev+' ريال'],
    ['المبالغ المحصّلة:', doneRev+' ريال'],
    ['المبالغ المعلقة:', (totalRev-doneRev)+' ريال'],
  ];

  const BOM='\uFEFF';
  const csv=BOM+[H,...rows,...sumRows].map(r=>r.map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`تقرير_${RPD}_${now.toISOString().slice(0,10)}.csv`;a.click();
  toast('📊 تم تحميل Excel');
}

function genCode(){
  const role=document.getElementById('cr-role').value;
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='';for(let i=0;i<8;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  const codes=getCodes();codes.push({code,role,used:false,createdAt:today(),by:CU.id});
  saveCodes(codes);render();toast('✅ تم إنشاء الكود — انقر عليه للنسخ');
}
function copyCode(code){
  navigator.clipboard.writeText(code).then(()=>toast('📋 تم نسخ: '+code)).catch(()=>toast('الكود: '+code));
}
function delCode(code){if(!confirm('حذف هذا الكود؟'))return;saveCodes(getCodes().filter(c=>c.code!==code));render();toast('🗑️ تم الحذف');}
function removeUser(id,name){
  if(!confirm(`حذف حساب "${name}" وكل طلباته؟\nلا يمكن التراجع!`))return;
  saveUsers(getUsers().filter(u=>u.id!==id));
  saveAllOrders(getAllOrders().filter(o=>o.userId!==id));
  render();toast('🗑️ تم حذف الحساب');
}
function exportTeamExcel(){
  const all=getAllOrders();const users=getUsers();
  if(!all.length){toast('⚠️ لا توجد بيانات');return;}
  const H=['رقم الطلب','الموظف','اسم العميل','رقم الجوال','نوع الخدمة','الأولوية','الحالة','المبلغ (ريال)','تاريخ الطلب','مصدر الطلب','تفاصيل الطلب','ملاحظات'];
  const rows=all.map(o=>{const u=users.find(x=>x.id===o.userId);return[o.id,u?u.name:'—',o.client,o.phone,o.service,o.priority||'عادية',o.status,o.price||0,o.date||'',o.source||'',clean(o.desc),clean(o.notes)];});
  const BOM='\uFEFF';
  const csv=BOM+[H,...rows].map(r=>r.map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`الفريق_${today()}.csv`;a.click();
  toast('📊 تم تحميل تقرير الفريق');
}

// ═══════════════════════════════════════════════════
// MULTI-IMAGE HELPERS
// ═══════════════════════════════════════════════════
window._curImgs = undefined; // undefined=لم يتغير، array=حالة جديدة

function initImgGallery(existing){
  window._curImgs = existing ? [...existing] : [];
  renderGallery();
}

function renderGallery(){
  const wrap = document.getElementById('img-gallery-wrap');
  if(!wrap) return;
  const imgs = window._curImgs || [];
  const canAdd = imgs.length < 6;
  wrap.innerHTML = imgs.map((src,i)=>
    `<div class="img-thumb-wrap">
      <img src="${src}" alt="" onclick="openLightboxDraft(${i})"/>
      <button type="button" class="img-thumb-del" onclick="removeImgAt(${i})">✕</button>
    </div>`
  ).join('') + (canAdd ? `<button type="button" class="img-add-btn" onclick="document.getElementById('f-img-multi').click()"><span class="ia-icon">🖼️</span><span>${imgs.length===0?'أضف صورة':'+ صورة'}</span></button>` : '');
}

function addImgs(input){
  if(!input.files||!input.files.length) return;
  const files = Array.from(input.files);
  let loaded = 0;
  files.forEach(file=>{
    if((window._curImgs||[]).length >= 6){toast('⚠️ الحد الأقصى 6 صور');return;}
    if(file.size > 5*1024*1024){toast('⚠️ '+file.name+' أكبر من 5MB');return;}
    const reader = new FileReader();
    reader.onload = function(e){
      if(!window._curImgs) window._curImgs=[];
      window._curImgs.push(e.target.result);
      renderGallery();
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function removeImgAt(i){
  if(!window._curImgs) return;
  window._curImgs.splice(i,1);
  renderGallery();
}

// Lightbox for draft (form)
function openLightboxDraft(startIdx){
  openLightbox(window._curImgs||[], startIdx);
}

// ─── Lightbox ───
let _lbImgs=[], _lbIdx=0;
function openLightbox(imgs, idx){
  _lbImgs=imgs; _lbIdx=idx||0;
  let lb=document.getElementById('_lightbox');
  if(!lb){
    lb=document.createElement('div');lb.className='lightbox';lb.id='_lightbox';
    lb.innerHTML=`<button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <button class="lightbox-nav prev" onclick="lbPrev()">‹</button>
      <img id="_lb-img" src="" alt=""/>
      <button class="lightbox-nav next" onclick="lbNext()">›</button>
      <div class="lightbox-count" id="_lb-count"></div>`;
    lb.addEventListener('click',function(e){if(e.target===lb)closeLightbox();});
    document.body.appendChild(lb);
  }
  lb.style.display='flex';
  lbShow();
  document.addEventListener('keydown',lbKey);
}
function lbShow(){
  document.getElementById('_lb-img').src=_lbImgs[_lbIdx]||'';
  document.getElementById('_lb-count').textContent=(_lbIdx+1)+' / '+_lbImgs.length;
  const lb=document.getElementById('_lightbox');
  if(lb){
    lb.querySelector('.prev').style.display=_lbImgs.length>1?'flex':'none';
    lb.querySelector('.next').style.display=_lbImgs.length>1?'flex':'none';
  }
}
function lbPrev(){_lbIdx=(_lbIdx-1+_lbImgs.length)%_lbImgs.length;lbShow();}
function lbNext(){_lbIdx=(_lbIdx+1)%_lbImgs.length;lbShow();}
function closeLightbox(){const lb=document.getElementById('_lightbox');if(lb)lb.style.display='none';document.removeEventListener('keydown',lbKey);}
function lbKey(e){if(e.key==='ArrowLeft'||e.key==='ArrowDown')lbNext();else if(e.key==='ArrowRight'||e.key==='ArrowUp')lbPrev();else if(e.key==='Escape')closeLightbox();}

window._viewOrderImgs=[];



function saveForm(){
  const nm=document.getElementById('f-nm').value.trim();
  const ph=document.getElementById('f-ph').value.trim();
  const ds=document.getElementById('f-ds').value.trim();
  if(!nm||!ph||!ds){toast('⚠️ يرجى تعبئة الحقول الإلزامية');return;}
  const all=getAllOrders();
  const vals={client:nm,phone:ph,desc:ds,
    service:document.getElementById('f-sv').value,
    source:document.getElementById('f-sr').value,
    price:parseInt(document.getElementById('f-pr').value)||0,
    paid:parseInt(document.getElementById('f-pd').value)||0,
    date:document.getElementById('f-dt').value,
    deadline:document.getElementById('f-dl').value,
    priority:document.getElementById('f-pv').value,
    status:document.getElementById('f-st').value||'جديد',
    notes:document.getElementById('f-nt').value.trim(),
    imgs:(function(){
      const v=window._curImgs;
      if(v!==undefined) return v||[];
      if(EID){const existing=(MY.find(x=>x.id===EID)||{});return existing.imgs||(existing.img?[existing.img]:[]);}
      return [];
    })(),
    img:undefined};
  if(EID){
    const i=all.findIndex(x=>x.id===EID);
    if(i>-1){const old=all[i];const merged={...old,...vals};delete merged.img;all[i]=merged;
      if(old.status!==vals.status) addLog(EID,'تغيير الحالة من «'+old.status+'» إلى «'+vals.status+'»','accent');
      if(old.paid!==vals.paid) addLog(EID,'تحديث المدفوع: '+fmtMoney(old.paid||0)+' ← '+fmtMoney(vals.paid)+' ر.س','green');
      addLog(EID,'تعديل بيانات الطلب');}
    toast('✅ تم تحديث الطلب');
  } else {
    const maxN=all.length?Math.max(...all.map(o=>parseInt((o.id||'ORD-0').replace('ORD-',''))||0)):0;
    const nid='ORD-'+String(maxN+1).padStart(3,'0');
    const newOrder={id:nid,userId:CU.id,createdAt:new Date().toISOString(),...vals};
    delete newOrder.img;
    all.unshift(newOrder);
    addLog(nid,'إنشاء الطلب','green');
    toast('✅ تم إضافة الطلب');
  }
  saveAllOrders(all);MY=all.filter(o=>o.userId===CU.id);
  closeModal();render();
}

function updateStat(id,status){
  const all=getAllOrders();const o=all.find(x=>x.id===id);
  if(o){const oldSt=o.status;o.status=status;saveAllOrders(all);MY=all.filter(x=>x.userId===CU.id);addLog(id,'تغيير الحالة من «'+oldSt+'» إلى «'+status+'»','accent');closeModal();render();toast('✅ الحالة: '+status);}
}
function delOrder(id){
  if(!confirm('حذف هذا الطلب نهائياً؟'))return;
  saveAllOrders(getAllOrders().filter(x=>x.id!==id));
  MY=getAllOrders().filter(o=>o.userId===CU.id);closeModal();render();toast('🗑️ تم الحذف');
}

function esc(s){return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function clean(s){return String(s||'').replace(/[\n\r,"]/g,' ');}
function today(){return new Date().toISOString().slice(0,10);}
function fmtMoney(n){return Number(n).toLocaleString('ar-SA');}
function showModal(){document.getElementById('overlay').style.display='flex';}
function closeModal(){document.getElementById('overlay').style.display='none';EID=null;window._curImgs=undefined;}

let _toasts=[];
function toast(msg,dur=2500){
  const w=document.getElementById('toast-wrap');
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  w.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},dur);
}

function updateBadge(){

}
